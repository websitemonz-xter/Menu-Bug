<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Monz - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background: url('https://cdn.phototourl.com/free/2026-06-27-6a6abf78-5e7c-4da4-a543-6cddb9e4706a.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white;
            padding: 20px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .container {
            width: 90%; max-width: 400px;
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-top {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px; margin-top: 15px;
            border-radius: 15px;
            display: flex; align-items: center; gap: 15px;
            cursor: pointer;
            text-decoration: none; color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 20px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <img src="https://cdn.phototourl.com/free/2026-06-27-adaed56d-30ce-42e0-b035-1512a456bb6b.jpg" alt="Logo" class="logo-top">
        
        <h2>Menu Bug Test</h2>
        <p style="font-size: 13px; opacity: 0.7; margin-bottom: 10px;">Bug Free jangan Berharap lebih</p>

        <!-- Menu Utama -->
        <a href="https://wa.me/6285199619115" class="option-btn">
            <div class="icon" style="background: #e74c3c;"><i class="fa-solid fa-bug"></i></div>
            <div style="text-align: left;">
                <h4 style="font-size: 16px;">Akses Menu Bug</h4>
                <p style="font-size: 12px; opacity: 0.8;">Klik untuk melanjutkan</p>
            </div>
        </a>
    </div>

</body>
</html>
